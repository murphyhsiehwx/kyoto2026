<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2026 關西黃金週｜京都五日行程</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f6f2eb;
      --surface: rgba(255,255,255,0.78);
      --surface-strong: rgba(255,255,255,0.92);
      --text: #1e1b18;
      --text-soft: #5f5953;
      --text-mute: #8a8178;
      --line: rgba(115, 89, 52, 0.16);
      --gold: #a37a42;
      --gold-soft: #d9c19d;
      --wine: #7b3d36;
      --shadow: 0 18px 50px rgba(40, 28, 16, 0.08);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --max: 1180px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: 'Noto Sans TC', sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(163,122,66,0.08), transparent 28%),
        radial-gradient(circle at top right, rgba(123,61,54,0.08), transparent 24%),
        linear-gradient(180deg, #fbf8f3 0%, var(--bg) 100%);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      display: block;
      max-width: 100%;
    }

    .shell {
      width: min(calc(100% - 32px), var(--max));
      margin: 0 auto;
    }

    .hero {
      padding: 28px 0 28px;
    }

    .hero-card {
      position: relative;
      overflow: hidden;
      min-height: 78vh;
      border-radius: 36px;
      background:
        linear-gradient(180deg, rgba(16,12,10,0.12), rgba(16,12,10,0.52)),
        url('https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?auto=format&fit=crop&w=1600&q=80') center center/cover;
      box-shadow: var(--shadow);
      display: flex;
      align-items: flex-end;
    }

    .hero-card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(0,0,0,0.16));
      pointer-events: none;
    }

    .hero-inner {
      position: relative;
      z-index: 1;
      width: 100%;
      padding: 72px 40px 42px;
      color: #fff;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-size: 12px;
      letter-spacing: 0.36em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.8);
      margin-bottom: 22px;
    }

    .eyebrow::before {
      content: "";
      width: 42px;
      height: 1px;
      background: rgba(255,255,255,0.55);
    }

    .hero-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(280px, 0.8fr);
      gap: 28px;
      align-items: end;
    }

    .hero-copy h1 {
      margin: 0;
      font-family: 'Noto Serif TC', serif;
      font-weight: 600;
      font-size: clamp(2.1rem, 5vw, 4.2rem);
      line-height: 1.2;
      letter-spacing: 0.04em;
    }

    .hero-copy p {
      width: min(680px, 100%);
      margin: 20px 0 0;
      color: rgba(255,255,255,0.85);
      font-size: clamp(0.98rem, 1.4vw, 1.06rem);
    }

    .hero-meta {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.18);
      backdrop-filter: blur(16px);
      border-radius: 24px;
      padding: 22px 22px 18px;
    }

    .hero-meta-title {
      font-size: 12px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.72);
      margin-bottom: 14px;
    }

    .meta-list {
      display: grid;
      gap: 14px;
    }

    .meta-item {
      display: grid;
      grid-template-columns: 76px 1fr;
      gap: 12px;
      align-items: start;
      font-size: 14px;
      color: rgba(255,255,255,0.9);
    }

    .meta-label {
      color: rgba(255,255,255,0.58);
    }

    .section {
      padding: 28px 0 0;
    }

    .section-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 20px;
    }

    .section-kicker {
      color: var(--gold);
      font-size: 12px;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .section-title {
      margin: 0;
      font-family: 'Noto Serif TC', serif;
      font-size: clamp(1.5rem, 2.5vw, 2.2rem);
      line-height: 1.3;
    }

    .section-note {
      max-width: 480px;
      color: var(--text-soft);
      font-size: 14px;
    }

    .overview {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 16px;
    }

    .overview-card {
      background: var(--surface-strong);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 18px 18px 16px;
      box-shadow: 0 12px 30px rgba(40, 28, 16, 0.04);
    }

    .overview-top {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: baseline;
      margin-bottom: 14px;
    }

    .overview-day {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
      color: var(--gold);
      line-height: 1;
    }

    .overview-date {
      font-size: 12px;
      color: var(--text-mute);
      letter-spacing: 0.08em;
    }

    .overview-weather {
      font-size: 20px;
      margin-bottom: 10px;
    }

    .overview-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .overview-sub {
      font-size: 13px;
      color: var(--text-soft);
      line-height: 1.6;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 290px;
      gap: 28px;
      align-items: start;
      margin-top: 26px;
    }

    .days {
      display: grid;
      gap: 26px;
    }

    .day {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      overflow: hidden;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .day-grid {
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      min-height: 420px;
    }

    .day-copy {
      padding: 28px 28px 28px;
    }

    .day-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 18px;
    }

    .day-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(163,122,66,0.1);
      color: var(--gold);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .day-weather {
      color: var(--text-mute);
      font-size: 13px;
      white-space: nowrap;
    }

    .day h3 {
      margin: 0 0 12px;
      font-family: 'Noto Serif TC', serif;
      font-size: clamp(1.25rem, 2vw, 1.7rem);
      line-height: 1.35;
    }

    .day-lead {
      margin: 0 0 20px;
      color: var(--text-soft);
      font-size: 14px;
    }

    .timeline-list {
      display: grid;
      gap: 14px;
      margin-bottom: 18px;
    }

    .timeline-item {
      display: grid;
      grid-template-columns: 76px 1fr;
      gap: 12px;
      align-items: start;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--line);
    }

    .timeline-item:last-child { border-bottom: none; padding-bottom: 0; }

    .time {
      font-family: 'Cormorant Garamond', serif;
      color: var(--gold);
      font-size: 1.15rem;
      line-height: 1.2;
      padding-top: 1px;
    }

    .event-title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .event-desc {
      font-size: 13px;
      color: var(--text-soft);
      line-height: 1.65;
    }

    .event-desc a,
    .food-link,
    .sidebar a {
      color: var(--wine);
      border-bottom: 1px solid rgba(123,61,54,0.28);
      transition: .2s ease;
    }

    .event-desc a:hover,
    .food-link:hover,
    .sidebar a:hover {
      border-color: var(--wine);
    }

    .food-box {
      margin-top: 18px;
      background: rgba(255,255,255,0.74);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
    }

    .food-title {
      font-size: 12px;
      color: var(--gold);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .food-list {
      display: grid;
      gap: 10px;
    }

    .food-item {
      display: grid;
      grid-template-columns: 54px 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--line);
    }

    .food-item:last-child { border-bottom: none; padding-bottom: 0; }

    .chip {
      display: inline-flex;
      justify-content: center;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    .chip.option {
      background: rgba(163,122,66,0.12);
      color: #8c6633;
    }

    .chip.booked {
      background: rgba(77, 119, 74, 0.12);
      color: #487247;
    }

    .food-name {
      font-size: 13px;
      font-weight: 700;
    }

    .food-meta {
      font-size: 12px;
      color: var(--text-mute);
    }

    .narrative {
      margin-top: 18px;
      padding: 14px 16px;
      border-left: 3px solid var(--gold-soft);
      background: rgba(245, 238, 227, 0.9);
      border-radius: 0 14px 14px 0;
      font-size: 13px;
      color: var(--text-soft);
    }

    .day-media {
      position: relative;
      min-height: 100%;
      background: #ddd;
    }

    .day-media img {
      width: 100%;
      height: 100%;
      min-height: 420px;
      object-fit: cover;
      filter: saturate(0.94) contrast(1.02) brightness(0.96);
      transition: transform .7s ease;
    }

    .day:hover .day-media img { transform: scale(1.03); }

    .media-overlay {
      position: absolute;
      inset: auto 0 0 0;
      padding: 42px 24px 20px;
      background: linear-gradient(180deg, transparent, rgba(0,0,0,0.54));
      color: rgba(255,255,255,0.95);
    }

    .media-kicker {
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.74);
      margin-bottom: 6px;
    }

    .media-title {
      font-family: 'Noto Serif TC', serif;
      font-size: 1.15rem;
      line-height: 1.4;
      margin: 0;
    }

    .sidebar {
      position: sticky;
      top: 20px;
      display: grid;
      gap: 18px;
    }
